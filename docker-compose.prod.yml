version: '3.8'

services:
  # ISP Status Page Application - Production
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: isp-status-app-prod
    ports:
      - "80:80"
    volumes:
      - logs:/var/www/html/logs
    environment:
      - APP_NAME=${APP_NAME:-ISP Status Page}
      - APP_URL=${APP_URL:-https://status.example.com}
      - APP_DEBUG=false
      - SECURITY_SALT=${SECURITY_SALT}
      - DATABASE_URL=postgres://${POSTGRES_USER:-isp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isp_status}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - ENABLE_CRON=true
      # Email configuration
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
    cap_add:
      - NET_RAW
    networks:
      - isp-status-network
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/v2/health/ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL 16 Database - Production
  postgres:
    image: postgres:16-alpine
    container_name: isp-status-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isp_status}
      POSTGRES_USER: ${POSTGRES_USER:-isp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - isp-status-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isp} -d ${POSTGRES_DB:-isp_status}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 7 Cache / Session / Queue - Production
  redis:
    image: redis:7-alpine
    container_name: isp-status-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - isp-status-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Queue Worker: Default (processes monitor check jobs)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: isp-status-worker-prod
    volumes:
      - logs:/var/www/html/logs
    environment:
      - APP_NAME=${APP_NAME:-ISP Status Page}
      - APP_URL=${APP_URL:-https://status.example.com}
      - APP_DEBUG=false
      - SECURITY_SALT=${SECURITY_SALT}
      - DATABASE_URL=postgres://${POSTGRES_USER:-isp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isp_status}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - ENABLE_CRON=false
    command: ["sh", "-c", "cd /var/www/html && bin/cake queue worker --config default --verbose"]
    cap_add:
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - isp-status-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Queue Worker: Notifications (processes async alert/escalation/webhook jobs)
  worker-notifications:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: isp-status-worker-notifications-prod
    volumes:
      - logs:/var/www/html/logs
    environment:
      - APP_NAME=${APP_NAME:-ISP Status Page}
      - APP_URL=${APP_URL:-https://status.example.com}
      - APP_DEBUG=false
      - SECURITY_SALT=${SECURITY_SALT}
      - DATABASE_URL=postgres://${POSTGRES_USER:-isp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isp_status}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - ENABLE_CRON=false
    command: ["sh", "-c", "cd /var/www/html && bin/cake queue worker --config notifications --verbose"]
    cap_add:
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - isp-status-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Scheduler: Pushes due monitor checks and escalations to the queue
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: isp-status-scheduler-prod
    volumes:
      - logs:/var/www/html/logs
    environment:
      - APP_NAME=${APP_NAME:-ISP Status Page}
      - APP_URL=${APP_URL:-https://status.example.com}
      - APP_DEBUG=false
      - SECURITY_SALT=${SECURITY_SALT}
      - DATABASE_URL=postgres://${POSTGRES_USER:-isp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isp_status}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - ENABLE_CRON=false
    command: ["sh", "-c", "cd /var/www/html && bin/cake scheduler"]
    cap_add:
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - isp-status-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  isp-status-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs:
    driver: local
