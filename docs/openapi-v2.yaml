openapi: 3.1.0
info:
  title: ISP Status Page API
  description: |
    REST API for ISP Status Page — a multi-tenant SaaS monitoring platform.
    All endpoints (except auth) require JWT Bearer authentication.
  version: 2.0.0
  contact:
    name: ISP Status Page
  license:
    name: Proprietary

servers:
  - url: http://localhost:8765/api/v2
    description: Development
  - url: https://your-domain.com/api/v2
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication, registration, OAuth, token management
  - name: Dashboard
    description: Dashboard summary, uptime, response times
  - name: Monitors
    description: Monitor CRUD, bulk operations, CSV import
  - name: Checks
    description: Monitor check results
  - name: Incidents
    description: Incident management, timeline updates, acknowledgement
  - name: Alert Rules
    description: Alert rule CRUD
  - name: Escalation Policies
    description: Escalation policy CRUD
  - name: Integrations
    description: External integrations (IXC, Zabbix, REST API)
  - name: SLA
    description: SLA definitions, reports, export
  - name: Status Pages
    description: Public status page management
  - name: Maintenance Windows
    description: Scheduled maintenance windows
  - name: Settings
    description: Organization settings
  - name: Billing
    description: Plans, checkout, credits
  - name: Users
    description: Team member management
  - name: Invitations
    description: Team invitations
  - name: API Keys
    description: API key management
  - name: Reports
    description: CSV report exports
  - name: Scheduled Reports
    description: Automated scheduled reports
  - name: Activity Log
    description: Organization audit trail
  - name: Two-Factor Auth
    description: TOTP 2FA setup and management
  - name: Organizations
    description: Organization switching
  - name: Events
    description: Real-time Server-Sent Events
  - name: Super Admin
    description: Platform-wide administration (requires super admin)

paths:
  # ── Auth ──────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  minLength: 3
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
                two_factor_code:
                  type: string
                  description: 6-digit TOTP code (if 2FA enabled)
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke tokens
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                revoke_all:
                  type: boolean
                  default: false
      responses:
        '200':
          $ref: '#/components/responses/Message'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          current_organization:
                            $ref: '#/components/schemas/OrganizationRef'
                          organizations:
                            type: array
                            items:
                              $ref: '#/components/schemas/OrganizationRef'

  /auth/switch-org:
    post:
      tags: [Auth]
      summary: Switch active organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organization_id]
              properties:
                organization_id:
                  type: integer
      responses:
        '200':
          description: Switched organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/oauth/{provider}/redirect:
    get:
      tags: [Auth]
      summary: Get OAuth authorization URL
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, microsoft]
      responses:
        '200':
          description: Authorization URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          authorization_url:
                            type: string
                            format: uri

  /auth/oauth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OAuth callback handler
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, microsoft]
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to app with tokens in URL fragment

  # ── Dashboard ─────────────────────────────────────────
  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary cards
      responses:
        '200':
          description: Summary data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardSummary'

  /dashboard/uptime:
    get:
      tags: [Dashboard]
      summary: Per-monitor uptime percentages
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 1
            maximum: 30
      responses:
        '200':
          description: Uptime data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                name:
                                  type: string
                                uptime:
                                  type: number

  /dashboard/response-times:
    get:
      tags: [Dashboard]
      summary: Per-monitor average response times
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 1
            maximum: 30
      responses:
        '200':
          description: Response time data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                name:
                                  type: string
                                avg_response_time:
                                  type: number

  /dashboard/recent-checks:
    get:
      tags: [Dashboard]
      summary: Last 20 checks across all monitors
      responses:
        '200':
          description: Recent checks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Check'

  /dashboard/recent-alerts:
    get:
      tags: [Dashboard]
      summary: Last 10 alert log entries
      responses:
        '200':
          description: Recent alerts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AlertLog'

  # ── Monitors ──────────────────────────────────────────
  /monitors:
    get:
      tags: [Monitors]
      summary: List monitors
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            type: string
            enum: [up, down, degraded, unknown]
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/MonitorType'
        - name: active
          in: query
          schema:
            type: boolean
        - name: tag
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated monitor list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Monitor'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
    post:
      tags: [Monitors]
      summary: Create monitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorInput'
      responses:
        '201':
          description: Monitor created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          monitor:
                            $ref: '#/components/schemas/Monitor'

  /monitors/{id}:
    get:
      tags: [Monitors]
      summary: Get monitor with stats
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Monitor detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          monitor:
                            $ref: '#/components/schemas/Monitor'
                          uptime_24h:
                            type: number
                          avg_response_time:
                            type: number
                            nullable: true
                          total_checks_24h:
                            type: integer
                          uptime_history:
                            type: array
                            items:
                              type: object
                              properties:
                                date:
                                  type: string
                                  format: date
                                uptime:
                                  type: number
    put:
      tags: [Monitors]
      summary: Update monitor
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorInput'
      responses:
        '200':
          description: Monitor updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          monitor:
                            $ref: '#/components/schemas/Monitor'
    delete:
      tags: [Monitors]
      summary: Delete monitor
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/Message'

  /monitors/{id}/checks:
    get:
      tags: [Monitors]
      summary: Get checks for a monitor
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated check list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Check'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /monitors/{id}/pause:
    post:
      tags: [Monitors]
      summary: Pause monitor
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Monitor paused
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          monitor:
                            $ref: '#/components/schemas/Monitor'

  /monitors/{id}/resume:
    post:
      tags: [Monitors]
      summary: Resume monitor
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Monitor resumed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          monitor:
                            $ref: '#/components/schemas/Monitor'

  /monitors/bulk-action:
    post:
      tags: [Monitors]
      summary: Bulk action on monitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, ids]
              properties:
                action:
                  type: string
                  enum: [pause, resume, delete]
                ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Bulk action result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          affected:
                            type: integer
                          action:
                            type: string

  /monitors/import:
    post:
      tags: [Monitors]
      summary: Import monitors from CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                csv:
                  type: string
                  description: CSV content as string
          multipart/form-data:
            schema:
              type: object
              properties:
                csv_file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          created:
                            type: integer
                          errors:
                            type: array
                            items:
                              type: string

  # ── Checks ────────────────────────────────────────────
  /checks:
    get:
      tags: [Checks]
      summary: List recent checks
      parameters:
        - name: monitor_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/Page'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Check list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          checks:
                            type: array
                            items:
                              $ref: '#/components/schemas/Check'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /checks/{id}:
    get:
      tags: [Checks]
      summary: Get single check
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Check detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          check:
                            $ref: '#/components/schemas/Check'

  # ── Incidents ─────────────────────────────────────────
  /incidents:
    get:
      tags: [Incidents]
      summary: List incidents
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            type: string
            enum: [investigating, identified, monitoring, resolved, active]
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, major, minor, maintenance]
        - name: monitor_id
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated incident list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Incident'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
    post:
      tags: [Incidents]
      summary: Create manual incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [monitor_id, title]
              properties:
                monitor_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                severity:
                  type: string
                  enum: [critical, major, minor, maintenance]
                  default: minor
                status:
                  type: string
                  enum: [investigating, identified, monitoring]
                  default: investigating
      responses:
        '201':
          description: Incident created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          incident:
                            $ref: '#/components/schemas/Incident'

  /incidents/{id}:
    get:
      tags: [Incidents]
      summary: Get incident with timeline
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Incident detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          incident:
                            $ref: '#/components/schemas/Incident'
                          updates:
                            type: array
                            items:
                              $ref: '#/components/schemas/IncidentUpdate'
                          timeline:
                            type: array
                            items:
                              type: object
    put:
      tags: [Incidents]
      summary: Update incident
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Incident updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          incident:
                            $ref: '#/components/schemas/Incident'
    delete:
      tags: [Incidents]
      summary: Delete incident
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/Message'

  /incidents/{id}/acknowledge:
    post:
      tags: [Incidents]
      summary: Acknowledge incident
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Incident acknowledged
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          incident:
                            $ref: '#/components/schemas/Incident'

  /incidents/{id}/updates:
    post:
      tags: [Incidents]
      summary: Add timeline update
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                status:
                  type: string
                  enum: [investigating, identified, monitoring, resolved, update]
                  default: update
                message:
                  type: string
                is_public:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Update added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          update:
                            $ref: '#/components/schemas/IncidentUpdate'

  # ── Alert Rules ───────────────────────────────────────
  /alert-rules:
    get:
      tags: [Alert Rules]
      summary: List alert rules
      responses:
        '200':
          description: Alert rule list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AlertRule'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
    post:
      tags: [Alert Rules]
      summary: Create alert rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleInput'
      responses:
        '201':
          description: Alert rule created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          alert_rule:
                            $ref: '#/components/schemas/AlertRule'

  /alert-rules/{id}:
    get:
      tags: [Alert Rules]
      summary: Get alert rule
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Alert rule detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          alert_rule:
                            $ref: '#/components/schemas/AlertRule'
    put:
      tags: [Alert Rules]
      summary: Update alert rule
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleInput'
      responses:
        '200':
          description: Alert rule updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          alert_rule:
                            $ref: '#/components/schemas/AlertRule'
    delete:
      tags: [Alert Rules]
      summary: Delete alert rule
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/Message'

  # ── Escalation Policies ───────────────────────────────
  /escalation-policies:
    get:
      tags: [Escalation Policies]
      summary: List escalation policies
      responses:
        '200':
          description: Policy list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/EscalationPolicy'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
    post:
      tags: [Escalation Policies]
      summary: Create escalation policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalationPolicyInput'
