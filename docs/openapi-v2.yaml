# ── Components ────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100

  responses:
    Message:
      description: Success message
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiWrapper'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string

  schemas:
    ApiWrapper:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            token_type:
              type: string
              example: Bearer
            expires_in:
              type: integer
            user:
              $ref: '#/components/schemas/User'
            organization:
              $ref: '#/components/schemas/OrganizationRef'

    TokenResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            token_type:
              type: string
              example: Bearer
            expires_in:
              type: integer

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        is_super_admin:
          type: boolean
        two_factor_enabled:
          type: boolean
        language:
          type: string
        timezone:
          type: string

    OrganizationRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        is_current:
          type: boolean

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        joined_at:
          type: string
          format: date-time

    MonitorType:
      type: string
      enum: [http, ping, port, api, keyword, ssl, heartbeat, ixc_service, ixc_equipment, zabbix_host, zabbix_trigger]

    Monitor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/MonitorType'
        status:
          type: string
          enum: [up, down, degraded, unknown]
        active:
          type: boolean
        check_interval:
          type: integer
        timeout:
          type: integer
        configuration:
          type: object
        tags:
          type: array
          items:
            type: string
        uptime_percentage:
          type: number
          nullable: true
        last_check_at:
          type: string
          format: date-time
          nullable: true
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time

    MonitorInput:
      type: object
      required: [name, type, configuration]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: '#/components/schemas/MonitorType'
        configuration:
          type: object
          description: Type-specific configuration (url, host, port, etc.)
        check_interval:
          type: integer
          default: 300
          minimum: 30
        timeout:
          type: integer
          default: 30
          minimum: 1
        active:
          type: boolean
          default: true
        tags:
          type: array
          items:
            type: string

    Check:
      type: object
      properties:
        id:
          type: integer
        monitor_id:
          type: integer
        monitor:
          type: object
          properties:
            name:
              type: string
        status:
          type: string
          enum: [success, error, timeout]
        response_time:
          type: number
        status_code:
          type: integer
          nullable: true
        error_message:
          type: string
          nullable: true
        checked_at:
          type: string
          format: date-time

    Incident:
      type: object
      properties:
        id:
          type: integer
        monitor_id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [investigating, identified, monitoring, resolved]
        severity:
          type: string
          enum: [critical, major, minor, maintenance]
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        acknowledged_by:
          type: string
          nullable: true
        auto_created:
          type: boolean
        started_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        created:
          type: string
          format: date-time

    IncidentUpdate:
      type: object
      properties:
        id:
          type: integer
        incident_id:
          type: integer
        status:
          type: string
        message:
          type: string
        is_public:
          type: boolean
        user_id:
          type: integer
          nullable: true
        created:
          type: string
          format: date-time

    AlertRule:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        monitor_id:
          type: integer
        monitor_name:
          type: string
        trigger_type:
          type: string
          enum: [down, up, degraded, any]
        channel:
          type: string
          enum: [email, sms, telegram, webhook]
        recipients:
          type: array
          items:
            type: string
        cooldown_minutes:
          type: integer
        active:
          type: boolean
        created:
          type: string
          format: date-time

    AlertRuleInput:
      type: object
      required: [name, monitor_id, trigger_type, channel, recipients]
      properties:
        name:
          type: string
        monitor_id:
          type: integer
        trigger_type:
          type: string
          enum: [down, up, degraded, any]
        channel:
          type: string
          enum: [email, sms, telegram, webhook]
        recipients:
          type: array
          items:
            type: string
        cooldown_minutes:
          type: integer
          default: 15
          minimum: 1
        active:
          type: boolean
          default: true

    AlertLog:
      type: object
      properties:
        id:
          type: integer
        alert_rule:
          type: object
          properties:
            name:
              type: string
        monitor:
          type: object
          properties:
            name:
              type: string
        channel:
          type: string
        status:
          type: string
          enum: [sent, failed]
        created:
          type: string
          format: date-time

    EscalationPolicy:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean
        steps:
          type: array
          items:
            type: object
            properties:
              delay_minutes:
                type: integer
              channel:
                type: string
              recipients:
                type: array
                items:
                  type: string
        created:
          type: string
          format: date-time

    EscalationPolicyInput:
      type: object
      required: [name, steps]
      properties:
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
          default: true
        steps:
          type: array
          minItems: 1
          items:
            type: object
            required: [delay_minutes, channel, recipients]
            properties:
              delay_minutes:
                type: integer
                minimum: 1
              channel:
                type: string
                enum: [email, sms, telegram, webhook]
              recipients:
                type: array
                items:
                  type: string

    Integration:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [ixc, zabbix, rest_api]
        active:
          type: boolean
        last_test_status:
          type: string
          nullable: true
        created:
          type: string
          format: date-time

    IntegrationInput:
      type: object
      required: [name, type, configuration]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [ixc, zabbix, rest_api]
        configuration:
          type: object
          description: Type-specific config (base_url, username, password, etc.)
        active:
          type: boolean
          default: true

    Sla:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        monitor_id:
          type: integer
        target_uptime:
          type: number
        period:
          type: string
          enum: [monthly, quarterly, yearly]
        downtime_budget_minutes:
          type: integer
        actual_uptime:
          type: number
          nullable: true
        status:
          type: string
          enum: [compliant, at_risk, breached]
          nullable: true
        created:
          type: string
          format: date-time

    SlaInput:
      type: object
      required: [name, monitor_id, target_uptime, period]
      properties:
        name:
          type: string
        monitor_id:
          type: integer
        target_uptime:
          type: number
          minimum: 0
          maximum: 100
        period:
          type: string
          enum: [monthly, quarterly, yearly]
        downtime_budget_minutes:
          type: integer
          minimum: 0

    StatusPage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        custom_domain:
          type: string
          nullable: true
        is_active:
          type: boolean
        created:
          type: string
          format: date-time

    StatusPageInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        custom_domain:
          type: string
        is_active:
          type: boolean
          default: true

    MaintenanceWindow:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        created:
          type: string
          format: date-time

    MaintenanceWindowInput:
      type: object
      required: [title, start_at, end_at]
      properties:
        title:
          type: string
        description:
