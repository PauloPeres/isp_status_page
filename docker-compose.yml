# Copy .env.example to .env and set secrets for production
# NOTE: Build the Angular frontend before deploying:
#   make build-frontend   (or: cd frontend && npx ng build --configuration=production)
#   This copies the SPA to src/webroot/app/ which is served at /app/*
services:
  # ISP Status Page Application (includes cron for monitoring)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: isp-status-app
    ports:
      - "8765:80"
    volumes:
      # Mount source code for development (hot reload)
      - ./src:/var/www/html
      # Persist logs
      - ./src/logs:/var/www/html/logs
    environment:
      - APP_NAME=ISP Status Page
      - APP_URL=${APP_URL:-http://localhost:8765}
      - APP_DEBUG=${APP_DEBUG:-false}
      - SECURITY_SALT=${SECURITY_SALT:-change-me-in-production}
      - DATABASE_URL=postgres://isp:${POSTGRES_PASSWORD:-isp_secret}@postgres:5432/isp_status
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - ENABLE_CRON=true
    cap_add:
      - NET_RAW
    networks:
      - isp-status-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # PostgreSQL 16 Database
  postgres:
    image: postgres:16-alpine
    container_name: isp-status-postgres
    environment:
      POSTGRES_DB: isp_status
      POSTGRES_USER: isp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isp_secret}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - isp-status-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isp -d isp_status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Redis 7 Cache / Session / Queue
  redis:
    image: redis:7-alpine
    container_name: isp-status-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - isp-status-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_secret} ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Queue Worker: Notifications (processes async alert/escalation jobs)
  worker-notifications:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: isp-status-worker-notifications
    volumes:
      - ./src:/var/www/html
      - ./src/logs:/var/www/html/logs
    environment:
      - APP_NAME=ISP Status Page
      - APP_URL=${APP_URL:-http://localhost:8765}
      - APP_DEBUG=${APP_DEBUG:-false}
      - SECURITY_SALT=${SECURITY_SALT:-change-me-in-production}
      - DATABASE_URL=postgres://isp:${POSTGRES_PASSWORD:-isp_secret}@postgres:5432/isp_status
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    command: ["sh", "-c", "cd /var/www/html && bin/cake queue worker --config notifications --verbose"]
    cap_add:
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - isp-status-network

networks:
  isp-status-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
